# SQLite
spring.datasource.url=jdbc:sqlite:${user.dir}/oscar.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.use_get_generated_keys=false

# OMDb API key
# Stored in backend/.env as OMDB_API_KEY, or provided as an environment variable.
# This property simply mirrors the environment value if present.
omdb.api.key=${OMDB_API_KEY:}

# Server
server.port=8080

# CORS - allow frontend in dev
# Configure in WebMvcConfig or application.properties if needed
